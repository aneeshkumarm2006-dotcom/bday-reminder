name: CI

# Stage 13 - Testing & QA. Runs every package's test suite on push/PR so the
# build is verified end-to-end before deploy (Stage 14). Independent jobs mirror
# the independent-install monorepo layout (backend / app / website / e2e).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (unit + integration + smokes)
    # 22.04 has the best mongodb-memory-server (MongoDB 7) binary support.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # Cache the downloaded in-memory MongoDB binary across runs.
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - name: Unit + integration tests (Vitest)
        run: npm test
      - name: Smoke suites (end-to-end acceptance net)
        run: |
          npm run smoke
          npm run smoke:people
          npm run smoke:reminders
          npm run smoke:settings
          npm run smoke:stage6
          npm run smoke:stage7
          npm run smoke:stage8
          npm run smoke:stage9
          npm run smoke:stage12

  app:
    name: App (component tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: Component + logic tests (Jest)
        run: npm run test:ci

  website:
    name: Website (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  e2e:
    name: E2E (Playwright, web)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache MongoDB binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}
      # The Playwright web servers run the backend (dev:memory) + the static app
      # export, so all three packages must be installed and the app built.
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: app
      - run: npm ci
        working-directory: e2e
      - name: Build the web app export
        run: npm run build
        working-directory: app
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: e2e
      - name: Run E2E
        run: npx playwright test
        working-directory: e2e
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
